<?xml version="1.0" encoding="UTF-8"?>
<!--
  Symbolic icon — monochrome, 16×16 optical grid.
  Uses the named colour "symbolic-fg" so GNOME theming can recolour it.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16">
  <style>rect, circle { fill: currentColor; }</style>

  <!-- 2×2 swatch grid at symbolic scale -->
  <!-- Each swatch: 6×6, gap 2, total 14×14, offset 1,1 -->
  <rect x="1"  y="1"  width="6" height="6" rx="1.5"/>
  <rect x="9"  y="1"  width="6" height="6" rx="1.5"/>
  <rect x="1"  y="9"  width="6" height="6" rx="1.5"/>
  <rect x="9"  y="9"  width="6" height="6" rx="1.5"/>

  <!-- Centre dot -->
  <circle cx="8" cy="8" r="1"/>
</svg>
